version: '3.8'

services:
  # Broker MQTT (Mosquitto)
  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: sentinel-mosquitto
    #network_mode: host
    ports:
      - "1883:1883"      # MQTT (TCP)
      - "9001:9001"      # WebSocket (opcjonalnie)
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config
      - ./docker/mosquitto/data:/mosquitto/data
      - ./docker/mosquitto/log:/mosquitto/log
    restart: unless-stopped

  # Baza danych TimescaleDB
  timescaledb:
    image: timescale/timescaledb:latest-pg14
    container_name: sentinel-timescaledb
    #network_mode: host
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sentinel
    volumes:
      - ./docker/timescaledb/data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Go Ingest Service
  ingest:
    build: ./services/ingest
    container_name: sentinel-ingest
    #network_mode: host
    depends_on:
      timescaledb:
        condition: service_healthy
      mosquitto:
        condition: service_started
    environment:
      MQTT_BROKER: tcp://mosquitto:1883
      DB_HOST: timescaledb
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: password
      DB_NAME: sentinel
    restart: unless-stopped

# Sieć (domyślnie tworzy jedną dla wszystkich serwisów)
networks:
  default:
    name: sentinel-network
